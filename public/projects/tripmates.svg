<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Tripmates — Travel together. Make friends. Save money.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.9" r="0.55">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#71717a" font-size="22" letter-spacing="6">
    <circle cx="106" cy="106" r="6" fill="#4ade80"/>
    <text x="128" y="113" text-transform="uppercase">PROTOTYPE / GROUP TRAVEL</text>
  </g>

  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" fill="#f4f4f5">
    <text x="100" y="430" font-size="172" font-weight="800" letter-spacing="-6" text-transform="uppercase">Tripmates</text>
    <text x="100" y="510" font-family="ui-monospace, monospace" font-size="34" fill="#a1a1aa">travel together. make friends. save money.</text>
  </g>

  <g font-family="ui-monospace, monospace" font-size="22" fill="#71717a">
    <text x="100" y="800">[ Next.js 16 / TypeScript / Tailwind v4 / shadcn ]</text>
  </g>
</svg>
